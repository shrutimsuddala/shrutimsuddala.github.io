<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Shruti Suddala</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>S</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Karla:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e0f; --rule: #2a2a2e; --ink-mid: #a09a90;
      --ink-dim: #5c5850; --white: #f0ece4; --accent: #c8a96e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Karla', sans-serif;
      background: var(--bg); color: var(--ink-mid);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 600; line-height: 1;
      color: var(--white); letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    .code em { font-style: italic; font-weight: 400; color: var(--accent); }
    .message {
      font-size: 0.92rem; color: var(--ink-mid);
      line-height: 1.7; max-width: 380px;
      margin-bottom: 2.5rem;
    }
    .back-link {
      font-family: 'Karla', sans-serif;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none;
      color: var(--accent); border: 1px solid var(--accent);
      padding: 0.75rem 1.6rem; border-radius: 2px;
      transition: all 0.2s;
    }
    .back-link:hover { background: var(--accent); color: #0e0e0f; }
    .divider {
      width: 40px; height: 1px; background: var(--rule);
      margin: 1.5rem 0;
    }
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem; color: var(--ink-dim);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="code">4<em>0</em>4</div>
  <p class="message">
    The page you're looking for doesn't exist or has been moved.
    Let's get you back to the portfolio.
  </p>
  <a href="/index.html" class="back-link">Back to Portfolio</a>
  <div class="divider"></div>
  <span class="name">Shruti Suddala</span>
</body>
</html>
